[folders]
# Папка с исходными файлами
source = _video_\0
# Папка для сохранения результатов
destination = _video_\1

[options]
# Сохранить только аудио (yes/no). При yes все video settings игнорируются
audio_only = no
# Объединить файлы в один (yes/no)
merge_files = no
# Разбить видео на кадры (yes/no). При yes все другие настройки игнорируются
create_frame = no
# Копировать без перекодирования (yes/no). При yes audio/video settings игнорируются
copy_codecs = no
# Извлечь аудио без перекодирования (yes/no). Копирует аудио-дорожку как есть
extract_audio_copy = no

[audio]
# Аудио кодек: aac, libmp3lame. Для видео на Apple — aac
# +/- перед значением: + включено, - выключено
codec = +aac
# Число каналов: 1 (mono), 2 (stereo)
channels = +2
# Аудио битрейт (кбит/с)
bitrate = +128
# Частота дискретизации (Гц). 48000 — стандарт для видео, 44100 — для музыки
sampling_rate = +48000
# Нормализация звука: loudnorm (EBU R128), dynaudnorm
normalize = -loudnorm

[video]
# Видео кодек. Программные: libx264, libx265, libsvtav1. GPU: h264_nvenc, hevc_nvenc, av1_nvenc, h264_qsv
codec = +libx264
# Разрешение (ШxВ). Примеры 16:9: 1920x1080, 1280x720, 640x360
resolution = +1280x720
# Видео битрейт (кбит/с). Если исходный битрейт ниже — не повышается. Игнорируется при включённом quality
bitrate = -3000
# Кадры в секунду
framerate = +30
# Поворот: 1 — по часовой, 2 — против часовой
rotation = -2
# Субтитры: burn — вшить в видео, meta — отдельная дорожка
subtitles = -burn
# Постоянное качество (CRF/CQ): 0-51, ниже = лучше. Когда включён — video bitrate игнорируется
quality = +23
# Сохранять пропорции при изменении разрешения (yes/no)
keep_aspect_ratio = +yes
# Выходной контейнер: mp4, mkv, webm, avi, ts
container = +mp4

[performance]
# Число потоков ffmpeg (для программных кодеков)
threads = +4
# Количество файлов для одновременной обработки
parallel_files = -2

[gpu]
# Аппаратное ускорение: nvidia (NVENC/CUVID), intel (QSV), off
hw_accel = +intel
# Пресет GPU: NVENC p1-p7, QSV veryfast/faster/fast/medium/slow/slower/veryslow
preset = -p5
# Tune (только NVIDIA): hq, ll, ull, lossless
tune = -hq
# Rate control (только NVIDIA): constqp, vbr, cbr
rc = -vbr

[speed]
# Скорость воспроизведения: 1.0 = нормальная, 2.0 = ускорение x2, 0.5 = замедление x2
playback_speed = -1.0

[split]
# Время начала кодирования (чч-мм-сс)
start = -01-00-00
# Длительность фрагмента (чч-мм-сс). 17000 секунд = 04-43-20
length = -00-05-00
# Разрезать по тишине — разрез будет в ближайшей паузе (yes/no)
split_by_silence = no
# Минимальная длительность тишины для разрезания (секунды)
silence_duration = 2.0
# Порог тишины для обнаружения
silence_threshold = -30dB

[other]
# Оставлять старое расширение в имени файла, напр. file.avi.mp4 (yes/no)
save_old_extension = no
# Формат файлов на входе (через запятую)
format_files_in = 3gp,avi,flv,mp4,mpg,mpeg,wmv,mov,asf,mkv,m4v,webm,mts,vob,m4b,mp3,wma,ogg,m4a,aac
# Стиль субтитров (ASS/SSA формат)
subtitles_style = FontName=Arial:FontSize=24:PrimaryColour=&HFFFFFF&
# Только показать команды, не запускать (yes/no)
dry_run = no
# Писать лог в файл (yes/no)
enable_log = no
# Путь к файлу лога
log_file = ffmpeg_convert.log
