name: CI

# Публичный репозиторий: тесты + secret-scan + сборка/провенанс EXE.
# Locale pre-commit hook защищает только локальные коммиты — эти проверки работают
# для web-commit, PR и новых форков.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Linux: Bash + common инварианты. CMD/PS1 suite'ы здесь ожидаемо пропускаются. ──
  linux-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests (SH + common; CMD/PS1 skip expected on Linux)
        run: bash tests/run_tests.sh

  # ── macOS: SH + common под системным Bash 3.2 и BSD-userland. Ловит регрессии
  #    портируемости (GNU-only sed/grep/sort, ${var,,}, stat -c), которые Linux не видит.
  #    CMD/PS1 suite'ы ожидаемо пропускаются (нет cmd/powershell) — без STRICT_SKIP. ──
  macos-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash version (диагностика — системный /bin/bash обычно 3.2)
        run: /bin/bash --version | head -1
      - name: Run tests (SH + common под BSD-userland; CMD/PS1 skip expected)
        run: /bin/bash tests/run_tests.sh

  # ── Secret scan всей истории (обход неактивного hook / web-commit / чужого автора). ──
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
      # gitleaks ловит секреты/ключи, но НЕ generic PII/private-infra. Их до сих пор
      # покрывал лишь локальный denylist (нет в web-commit/PR/форке). Этот скан —
      # всегда-включённый генерик-нетворк для приватных IPv4 (RFC1918) и e-mail.
      - name: Privacy scan (RFC1918 IP / e-mail)
        run: bash tools/privacy-scan.sh

  # ── Windows: полный SH/CMD/PS1 паритет (skip = ошибка), сборка EXE, целостность sidecar. ──
  windows-tests-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # STRICT_SKIP=1: падаем, только если ЦЕЛЫЙ suite пропущен (значит cmd/powershell
      # недоступен — реальный риск потери SH/CMD/PS1 паритета). Частичные окружения-скипы
      # (напр. интеграционный тест без реального ffmpeg) — допустимы.
      - name: Run full suite (whole CMD/PS1 suite skipped = failure)
        shell: bash
        env:
          STRICT_SKIP: "1"
        run: bash tests/run_tests.sh

      # Целостность закоммиченных артефактов: EXE ↔ его .sha256 sidecar.
      # (Проверяем закоммиченные файлы, НЕ свежую сборку: ps2exe не байт-воспроизводим.)
      - name: Verify committed EXE checksums
        shell: bash
        run: |
          rc=0
          for exe in ffmpeg/_VideoConverter_v16.exe yt-dlp/_VideoDownloader_v16.exe; do
            sc="$exe.sha256"
            if [ ! -f "$exe" ] || [ ! -f "$sc" ]; then echo "MISSING: $exe or $sc"; rc=1; continue; fi
            want=$(awk '{print tolower($1)}' "$sc")
            got=$(sha256sum "$exe" | awk '{print tolower($1)}')
            if [ "$want" != "$got" ]; then echo "SHA MISMATCH: $exe (want $want got $got)"; rc=1; else echo "OK: $exe"; fi
          done
          exit $rc

      # Целостность провенанса: SHA в release-manifest.json обязаны совпасть и с EXE,
      # и с sidecar (треугольник manifest↔EXE↔sidecar). Ловит дрейф, когда обновили EXE,
      # но забыли перегенерить манифест (или наоборот) — CI EXE↔sidecar это не видел.
      - name: Verify release manifest ↔ EXE ↔ sidecar
        shell: pwsh
        run: |
          $manifest = Get-Content release-manifest.json -Raw | ConvertFrom-Json
          $rc = 0
          foreach ($a in $manifest.artifacts) {
            if (-not (Test-Path $a.path)) { Write-Host "MISSING EXE: $($a.path)"; $rc = 1; continue }
            $got  = (Get-FileHash -Algorithm SHA256 $a.path).Hash.ToUpper()
            $man  = $a.sha256.ToUpper()
            $sc   = "$($a.path).sha256"
            $side = if (Test-Path $sc) { (((Get-Content $sc -Raw) -split '\s+')[0]).ToUpper() } else { '' }
            if ($man -ne $got) { Write-Host "MANIFEST MISMATCH: $($a.path) manifest=$man exe=$got"; $rc = 1 }
            elseif ($side -and $side -ne $got) { Write-Host "SIDECAR MISMATCH: $($a.path) sidecar=$side exe=$got"; $rc = 1 }
            else { Write-Host "OK triangle: $($a.path)" }
          }
          if ($rc -ne 0) { exit 1 }

      # Smoke-сборка: обе PS1-GUI собираются в EXE без ошибок (в отдельную папку,
      # чтобы не трогать закоммиченные артефакты). $LASTEXITCODE проверяем после КАЖДОЙ
      # сборки: иначе провал первой маскируется успехом второй (rc перетирается).
      - name: Build EXEs (smoke)
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File ffmpeg/build_exe.ps1
          if ($LASTEXITCODE -ne 0) { throw "ffmpeg build failed (rc=$LASTEXITCODE)" }
          powershell -ExecutionPolicy Bypass -File yt-dlp/build_exe.ps1
          if ($LASTEXITCODE -ne 0) { throw "yt-dlp build failed (rc=$LASTEXITCODE)" }
